env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = XKB_DEFAULT_LAYOUT,real-prog-dvorak # This is mostly for gamescope

source = ~/.config/hypr/hyprland.conf.d/*.conf

input {
    kb_layout = real-prog-dvorak,us
    kb_variant =
    kb_model =
    kb_options = caps:escape
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = true
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    accel_profile = flat
    repeat_rate = 25
    repeat_delay = 300
    natural_scroll = no
    numlock_by_default = true
}

general {
    gaps_in = 6
    gaps_out = 12
    gaps_workspaces = 50
    border_size = 1
    col.active_border = rgba(ffffffaa)
    col.inactive_border = rgba(2a2a2a80)

    layout = dwindle
}

decoration {
    rounding = 8
    blur {
        enabled = yes
        size = 8
        passes = 3
        ignore_opacity = on
        xray = false
    }

    shadow {
        enabled = yes
        range = 25
        render_power = 3
        color = rgba(00000044)
        color_inactive = rgba(00000022)
    }
}

animations {
    enabled = yes

    bezier = myBezier, 0.25, 0.46, 0.45, 0.94
    bezier = myBezierSpring, 0.34, 1.15, 0.64, 1

    animation = windows, 1, 4, myBezierSpring, slide
    animation = windowsOut, 1, 3, myBezier, slide
    animation = layers, 1, 4, myBezierSpring, slide
    animation = border, 1, 5, myBezier
    animation = fade, 1, 4, myBezier
    animation = workspaces, 1, 2, myBezier, slide
    animation = specialWorkspace, 1, 2, myBezier, slidefadevert -50%

}

dwindle {
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
    force_split = 2
}

master {
    new_status = master
}

gesture = 3, horizontal, workspace
gesture = 3, vertical, special, Obsidian

gestures {
    workspace_swipe_forever = true
    workspace_swipe_create_new = false
    workspace_swipe_direction_lock = false
}

cursor {
    no_hardware_cursors = true
    hide_on_key_press = false
    inactive_timeout = 5
}

misc {
    vfr = false
    vrr = false
    disable_hyprland_logo = true
    disable_splash_rendering = true
    enable_anr_dialog = false
}

xwayland {
    force_zero_scaling = true
}
