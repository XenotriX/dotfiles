font_size 14.0

# Colors
color0  #1e2127
color8  #5c6370
color1  #e06c75
color9  #e06c75
color2  #98c379
color10 #98c379
color3  #d19a66
color11 #d19a66
color4  #61afef
color12 #61afef
color5  #c678dd
color13 #c678dd
color6  #56b6c2
color14 #56b6c2
color7  #abb2bf
color15 #ffffff

background #2e2e2e                                                                                                         
foreground #c4c4c4

# Window
placement_strategy top-left
background_opacity 0.8

box_drawing_scale 2, 2, 2, 2

# nnn preview
allow_remote_control yes
listen_on unix:/tmp/kitty_nnn.sock
enabled_layouts splits

# BEGIN_KITTY_FONTS
font_family      family="JetBrainsMono Nerd Font"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

background_opacity 0.75
resize_increments true

touch_scroll_multiplier 10.0
